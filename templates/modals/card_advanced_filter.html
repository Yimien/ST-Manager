<div
  x-data="cardAdvancedFilter"
  x-show="showCardAdvancedFilterDrawer && isCardsMode"
  x-cloak
  @keydown.escape.window="requestClose()"
  class="card-advanced-filter-overlay"
>
  <div class="card-advanced-filter-backdrop" @click="requestClose()"></div>

  <aside class="card-advanced-filter-drawer" @click.stop>
    <div class="card-advanced-filter-header">
      <div class="card-advanced-filter-eyebrow">角色卡工作台</div>
      <h2>高级筛选</h2>
      <p>集中调整当前角色卡列表的范围、排序、收藏、时间和数值条件。</p>
      <button
        type="button"
        class="card-advanced-filter-close"
        @click="requestClose()"
      >
        关闭
      </button>
    </div>

    <div class="card-advanced-filter-body custom-scrollbar">
      <div class="card-advanced-filter-overview">
        <div class="card-advanced-filter-overview-head">
          <div>
            <div class="card-advanced-filter-overview-label">当前筛选概览</div>
            <p>
              已启用
              <strong
                x-text="$store.global.getCardAdvancedFilterCount()"
              ></strong>
              项条件
            </p>
          </div>
        </div>
        <div class="card-advanced-filter-overview-list">
          <template
            x-for="item in $store.global.getCardAdvancedFilterSummaryItems()"
            :key="`drawer-${item.key}`"
          >
            <button
              type="button"
              class="card-advanced-filter-overview-chip"
              @click="setSection(item.section)"
            >
              <span x-text="item.label"></span>
            </button>
          </template>
        </div>
      </div>

      <div class="card-advanced-filter-stat-grid">
        <template x-for="item in statItems" :key="item.key">
          <button
            type="button"
            class="card-advanced-filter-stat-card"
            @click="setSection(item.section)"
          >
            <span
              class="card-advanced-filter-stat-label"
              x-text="item.label"
            ></span>
            <strong
              class="card-advanced-filter-stat-value"
              x-text="item.value"
            ></strong>
          </button>
        </template>
      </div>

      <div class="card-advanced-filter-workbench">
        <nav class="card-advanced-filter-nav">
          <template x-for="section in sectionItems" :key="section.key">
            <button
              type="button"
              class="card-advanced-filter-nav-btn"
              :class="{ 'is-active': isSectionActive(section.key), 'has-value': section.active }"
              @click="setSection(section.key)"
            >
              <span x-text="section.label"></span>
            </button>
          </template>
        </nav>

        <div class="card-advanced-filter-stage">
          <div
            x-show="validationMessage"
            class="card-advanced-filter-error"
            x-text="validationMessage"
          ></div>

          <section
            x-show="isSectionActive('basic')"
            class="card-advanced-filter-module-card"
          >
            <div class="card-advanced-filter-module-head">
              <h3>基础筛选</h3>
              <p>调整当前列表的范围、排序和收藏状态。</p>
            </div>
            <div class="card-advanced-filter-field-grid">
              <label>
                搜索范围
                <select
                  x-model="draft.searchScope"
                  @change="syncValidationState()"
                >
                  <option value="current">当前目录</option>
                  <option value="all_dirs">全部目录</option>
                  <option value="full">全量</option>
                </select>
              </label>
              <label>
                当前列表排序
                <select x-model="draft.sort" @change="syncValidationState()">
                  <option value="date_desc">修改日期 (新→旧)</option>
                  <option value="date_asc">修改日期 (旧→新)</option>
                  <option value="import_desc">导入日期 (新→旧)</option>
                  <option value="import_asc">导入日期 (旧→新)</option>
                  <option value="name_asc">名称 (A→Z)</option>
                  <option value="name_desc">名称 (Z→A)</option>
                  <option value="token_desc">Token (大→小)</option>
                  <option value="token_asc">Token (小→大)</option>
                </select>
              </label>
            </div>
            <div class="card-advanced-filter-toggle-row">
              <label class="card-advanced-filter-checkbox">
                <input
                  type="checkbox"
                  x-model="draft.recursiveFilter"
                  @change="syncValidationState()"
                />
                包含子目录
              </label>
              <label>
                收藏筛选
                <select
                  x-model="draft.favFilter"
                  @change="syncValidationState()"
                >
                  <option value="none">显示全部</option>
                  <option value="included">只看收藏</option>
                  <option value="excluded">排除收藏</option>
                </select>
              </label>
            </div>
          </section>

          <section
            x-show="isSectionActive('time')"
            class="card-advanced-filter-module-card"
          >
            <div class="card-advanced-filter-module-head">
              <h3>时间筛选</h3>
              <p>按导入时间和修改时间缩小结果范围。</p>
            </div>
            <div class="card-advanced-filter-field-grid">
              <label>
                导入开始
                <input
                  type="date"
                  x-model="draft.importDateFrom"
                  @input="syncValidationState()"
                  @change="syncValidationState()"
                />
              </label>
              <label>
                导入结束
                <input
                  type="date"
                  x-model="draft.importDateTo"
                  @input="syncValidationState()"
                  @change="syncValidationState()"
                />
              </label>
              <label>
                修改开始
                <input
                  type="date"
                  x-model="draft.modifiedDateFrom"
                  @input="syncValidationState()"
                  @change="syncValidationState()"
                />
              </label>
              <label>
                修改结束
                <input
                  type="date"
                  x-model="draft.modifiedDateTo"
                  @input="syncValidationState()"
                  @change="syncValidationState()"
                />
              </label>
            </div>
          </section>

          <section
            x-show="isSectionActive('numeric')"
            class="card-advanced-filter-module-card"
          >
            <div class="card-advanced-filter-module-head">
              <h3>数值筛选</h3>
              <p>设置 Token 范围，用于快速收窄高密度角色卡。</p>
            </div>
            <div class="card-advanced-filter-field-grid">
              <label>
                Token 最小值
                <input
                  type="number"
                  inputmode="numeric"
                  x-model="draft.tokenMin"
                  @input="syncValidationState()"
                  @change="syncValidationState()"
                />
              </label>
              <label>
                Token 最大值
                <input
                  type="number"
                  inputmode="numeric"
                  x-model="draft.tokenMax"
                  @input="syncValidationState()"
                  @change="syncValidationState()"
                />
              </label>
            </div>
          </section>

          <section
            x-show="isSectionActive('tags')"
            class="card-advanced-filter-module-card"
          >
            <div class="card-advanced-filter-module-head">
              <h3>标签条件</h3>
              <p>沿用现有标签编辑器，只在这里展示摘要和快捷操作。</p>
            </div>
            <div class="card-advanced-filter-tag-summary">
              <p x-text="tagSummary"></p>
              <div class="card-advanced-filter-tag-stat">
                <span>包含 <span x-text="tagIncludeCount"></span></span>
                <span>排除 <span x-text="tagExcludeCount"></span></span>
              </div>
            </div>
            <div class="card-advanced-filter-tag-actions">
              <button type="button" @click="openTagFilterEditor()">
                编辑标签条件
              </button>
              <button type="button" @click="clearTagFilters()">
                清空标签条件
              </button>
            </div>
          </section>
        </div>
      </div>
    </div>

    <div class="card-advanced-filter-footer">
      <button type="button" @click="requestClose()">取消</button>
      <button type="button" @click="clearDraft()">清空草稿</button>
      <button type="button" @click="applyFilters()">应用筛选</button>
    </div>
  </aside>
</div>

<!-- 预设详情阅览界面 -->
<div
  x-show="showModal"
  x-cloak
  class="modal-overlay z-modal-std flex items-center justify-center p-4"
  @click.self="closeModal()"
  x-data="presetDetailReader()"
>
  <div
    class="preset-reader-modal bg-[var(--bg-panel)] border border-[var(--border-light)] rounded-2xl shadow-2xl flex flex-col w-full max-w-6xl h-[90vh] overflow-hidden"
  >
    <div
      class="border-b border-[var(--border-light)] px-4 py-3 bg-[var(--bg-sub)] flex items-center justify-between gap-3"
    >
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2 flex-wrap">
          <h3
            class="text-base md:text-lg font-bold text-[var(--text-main)] truncate"
            x-text="activePresetDetail?.name || '未命名预设'"
          ></h3>
          <span
            class="px-2 py-0.5 rounded text-[10px] font-bold uppercase border border-[var(--border-light)] bg-[var(--bg-panel)] text-[var(--text-main)]"
            x-text="activePresetDetail?.preset_kind || 'preset'"
          ></span>
          <span
            class="px-2 py-0.5 rounded text-[10px] border border-[var(--border-light)] text-[var(--text-dim)]"
            x-text="getSourceLabel()"
          ></span>
        </div>
        <div
          class="text-[11px] text-[var(--text-dim)] truncate mt-1"
          x-text="activePresetDetail?.path || ''"
        ></div>
      </div>

      <div class="flex items-center gap-2 flex-wrap justify-end">
        <button
          @click="exportActivePreset()"
          class="btn-secondary py-1.5 px-3 text-xs"
        >
          导出
        </button>
        <button
          @click="openRawViewer()"
          class="btn-secondary py-1.5 px-3 text-xs"
        >
          查看原始 JSON
        </button>
        <button
          @click="openAdvancedExtensions()"
          class="btn-secondary py-1.5 px-3 text-xs"
        >
          编辑扩展
        </button>
        <button
          @click="previewRestoreDefault()"
          class="btn-secondary py-1.5 px-3 text-xs"
          :disabled="!activePresetDetail?.capabilities?.can_restore_default"
          :class="!activePresetDetail?.capabilities?.can_restore_default ? 'opacity-50 cursor-not-allowed' : ''"
        >
          恢复默认
        </button>
        <button
          @click="openFullscreenEditor()"
          class="btn-primary py-1.5 px-3 text-xs"
        >
          全屏编辑
        </button>
        <button
          @click="closeModal()"
          class="btn-secondary py-1.5 px-3 text-xs hover:text-red-300"
        >
          关闭
        </button>
      </div>
    </div>

    <div
      class="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-6 bg-[var(--bg-body)]"
    >
      <template x-if="isLoading">
        <div
          class="h-full flex items-center justify-center text-sm text-[var(--text-dim)]"
        >
          正在加载预设详情...
        </div>
      </template>

      <template x-if="!isLoading && activePresetDetail">
        <div class="space-y-6">
          <section
            class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-panel)] p-4 md:p-5 space-y-4"
          >
            <div class="text-base font-bold text-[var(--text-main)]">
              基础信息
            </div>
            <div
              class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3 text-sm"
            >
              <div
                class="rounded-xl border border-[var(--border-light)] bg-[var(--bg-body)] p-3"
              >
                <div class="text-xs text-[var(--text-dim)] mb-1">名称</div>
                <div
                  class="font-bold text-[var(--text-main)]"
                  x-text="activePresetDetail?.name || '-' "
                ></div>
              </div>
              <div
                class="rounded-xl border border-[var(--border-light)] bg-[var(--bg-body)] p-3"
              >
                <div class="text-xs text-[var(--text-dim)] mb-1">类型</div>
                <div
                  class="font-bold text-[var(--text-main)]"
                  x-text="activePresetDetail?.preset_kind_label || '-' "
                ></div>
              </div>
              <div
                class="rounded-xl border border-[var(--border-light)] bg-[var(--bg-body)] p-3"
              >
                <div class="text-xs text-[var(--text-dim)] mb-1">来源</div>
                <div
                  class="text-[var(--text-main)]"
                  x-text="getSourceLabel()"
                ></div>
              </div>
              <div
                class="rounded-xl border border-[var(--border-light)] bg-[var(--bg-body)] p-3"
              >
                <div class="text-xs text-[var(--text-dim)] mb-1">文件路径</div>
                <div
                  class="font-mono text-xs break-all text-[var(--text-main)]"
                  x-text="activePresetDetail?.path || '-' "
                ></div>
              </div>
              <div
                class="rounded-xl border border-[var(--border-light)] bg-[var(--bg-body)] p-3"
              >
                <div class="text-xs text-[var(--text-dim)] mb-1">文件名</div>
                <div
                  class="font-mono text-xs break-all text-[var(--text-main)]"
                  x-text="activePresetDetail?.filename || '-' "
                ></div>
              </div>
              <div
                class="rounded-xl border border-[var(--border-light)] bg-[var(--bg-body)] p-3"
              >
                <div class="text-xs text-[var(--text-dim)] mb-1">修改时间</div>
                <div
                  class="text-[var(--text-main)]"
                  x-text="formatDate(activePresetDetail?.mtime)"
                ></div>
              </div>
              <div
                class="rounded-xl border border-[var(--border-light)] bg-[var(--bg-body)] p-3"
              >
                <div class="text-xs text-[var(--text-dim)] mb-1">文件大小</div>
                <div
                  class="text-[var(--text-main)]"
                  x-text="formatSize(activePresetDetail?.file_size)"
                ></div>
              </div>
              <div
                class="rounded-xl border border-[var(--border-light)] bg-[var(--bg-body)] p-3"
              >
                <div class="text-xs text-[var(--text-dim)] mb-1">
                  可恢复默认
                </div>
                <div
                  class="text-[var(--text-main)]"
                  x-text="activePresetDetail?.capabilities?.can_restore_default ? '是' : '否'"
                ></div>
              </div>
              <div
                class="rounded-xl border border-[var(--border-light)] bg-[var(--bg-body)] p-3"
              >
                <div class="text-xs text-[var(--text-dim)] mb-1">未知字段</div>
                <div
                  class="text-[var(--text-main)]"
                  x-text="activePresetDetail?.has_unknown_fields ? `${activePresetDetail?.unknown_fields?.length || 0} 个` : '无' "
                ></div>
              </div>
              <div
                class="rounded-xl border border-[var(--border-light)] bg-[var(--bg-body)] p-3 md:col-span-2 xl:col-span-3"
              >
                <div class="text-xs text-[var(--text-dim)] mb-1">
                  默认恢复来源
                </div>
                <div
                  class="text-xs break-all text-[var(--text-main)]"
                  x-text="defaultPreviewAvailable ? defaultPreviewPath : '尚未检测到默认模板' "
                ></div>
              </div>
            </div>
          </section>

          <section
            class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-panel)] p-4 md:p-5 space-y-4"
          >
            <div class="text-base font-bold text-[var(--text-main)]">
              参数配置
            </div>
            <template x-if="parameterSections.length === 0">
              <div class="text-sm text-[var(--text-dim)]">
                当前预设没有可结构化展示的参数配置。
              </div>
            </template>
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
              <template
                x-for="section in parameterSections"
                :key="section.name"
              >
                <div
                  class="rounded-xl border border-[var(--border-light)] bg-[var(--bg-body)] p-4 space-y-2"
                >
                  <div
                    class="text-sm font-bold text-[var(--text-main)]"
                    x-text="section.label"
                  ></div>
                  <template
                    x-for="item in section.items"
                    :key="`${section.name}-${item.key}`"
                  >
                    <div
                      class="flex items-start justify-between gap-4 text-xs py-1 border-b border-[var(--border-light)] last:border-b-0"
                    >
                      <div>
                        <div
                          class="text-[var(--text-main)]"
                          x-text="item.label"
                        ></div>
                        <div
                          class="text-[10px] text-[var(--text-dim)] font-mono"
                          x-text="item.source_key || item.key"
                        ></div>
                      </div>
                      <div
                        class="font-mono text-right text-[var(--text-sub)] whitespace-pre-wrap break-words max-w-[55%]"
                        x-text="formatValue(item.value)"
                      ></div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </section>

          <section
            class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-panel)] p-4 md:p-5 space-y-4"
          >
            <div class="text-base font-bold text-[var(--text-main)]">
              模板内容
            </div>
            <template x-if="templateItems.length === 0">
              <div class="text-sm text-[var(--text-dim)]">
                当前预设没有长文本模板字段。
              </div>
            </template>
            <div class="space-y-4">
              <template
                x-for="item in templateItems"
                :key="`${item.sectionName}-${item.key}`"
              >
                <div
                  class="rounded-xl border border-[var(--border-light)] bg-[var(--bg-body)] p-4"
                >
                  <div class="flex items-center justify-between gap-3 mb-3">
                    <div>
                      <div
                        class="text-sm font-bold text-[var(--text-main)]"
                        x-text="item.label"
                      ></div>
                      <div
                        class="text-[11px] text-[var(--text-dim)]"
                        x-text="item.sectionLabel"
                      ></div>
                    </div>
                    <div class="flex items-center gap-2">
                      <button
                        @click="copyText(item.value, item.label)"
                        class="btn-secondary px-3 py-1 text-xs rounded"
                      >
                        复制
                      </button>
                      <button
                        @click="viewLongText(item)"
                        class="btn-secondary px-3 py-1 text-xs rounded"
                      >
                        放大查看
                      </button>
                    </div>
                  </div>
                  <div
                    class="text-xs font-mono whitespace-pre-wrap break-words rounded-lg border border-[var(--border-light)] bg-black/10 p-3 text-[var(--text-sub)] max-h-64 overflow-auto custom-scrollbar"
                    x-text="item.value || ''"
                  ></div>
                </div>
              </template>
            </div>
          </section>

          <section
            class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-panel)] p-4 md:p-5 space-y-4"
          >
            <div class="text-base font-bold text-[var(--text-main)]">
              扩展与兼容
            </div>
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
              <div
                class="rounded-xl border border-[var(--border-light)] bg-[var(--bg-body)] p-4 space-y-3"
              >
                <div class="text-sm font-bold text-[var(--text-main)]">
                  扩展摘要
                </div>
                <div class="flex items-center justify-between text-xs">
                  <span class="text-[var(--text-dim)]">Regex 脚本</span
                  ><span
                    class="font-mono text-[var(--text-main)]"
                    x-text="extensionSummary.regexCount"
                  ></span>
                </div>
                <div class="flex items-center justify-between text-xs">
                  <span class="text-[var(--text-dim)]">Tavern Helper</span
                  ><span
                    class="font-mono text-[var(--text-main)]"
                    x-text="extensionSummary.scriptCount"
                  ></span>
                </div>
                <button
                  @click="openAdvancedExtensions()"
                  class="btn-secondary px-3 py-1.5 text-xs rounded"
                >
                  打开高级扩展编辑器
                </button>
              </div>
              <div
                class="rounded-xl border border-[var(--border-light)] bg-[var(--bg-body)] p-4 space-y-3"
              >
                <div class="text-sm font-bold text-[var(--text-main)]">
                  未知字段与兼容提示
                </div>
                <template
                  x-if="(activePresetDetail?.unknown_fields || []).length === 0 && compatibilitySections.length === 0"
                >
                  <div class="text-sm text-[var(--text-dim)]">
                    暂无兼容提示，保存时也未发现额外未知字段。
                  </div>
                </template>
                <template
                  x-if="(activePresetDetail?.unknown_fields || []).length > 0"
                >
                  <div class="space-y-2">
                    <div class="text-xs text-[var(--text-dim)]">
                      以下字段会在保存时保留：
                    </div>
                    <div class="flex flex-wrap gap-2">
                      <template
                        x-for="field in activePresetDetail?.unknown_fields || []"
                        :key="field"
                      >
                        <span
                          class="px-2 py-1 rounded border border-[var(--border-light)] bg-black/10 text-xs font-mono text-[var(--text-main)]"
                          x-text="field"
                        ></span>
                      </template>
                    </div>
                  </div>
                </template>
                <template
                  x-for="section in compatibilitySections"
                  :key="section.name"
                >
                  <div class="space-y-2">
                    <div
                      class="text-xs font-bold text-[var(--text-main)]"
                      x-text="section.label"
                    ></div>
                    <template x-for="item in section.items" :key="item.key">
                      <div
                        class="rounded-lg border border-[var(--border-light)] bg-black/10 p-2 text-xs"
                      >
                        <div
                          class="text-[var(--text-main)]"
                          x-text="item.label"
                        ></div>
                        <div
                          class="font-mono text-[var(--text-sub)] whitespace-pre-wrap break-words"
                          x-text="formatValue(item.value)"
                        ></div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </div>
          </section>

          <section
            class="rounded-2xl border border-[var(--border-light)] bg-[var(--bg-panel)] p-4 md:p-5 space-y-4"
          >
            <div class="text-base font-bold text-[var(--text-main)]">
              文件信息
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
              <div
                class="rounded-xl border border-[var(--border-light)] bg-[var(--bg-body)] p-3"
              >
                <div class="text-xs text-[var(--text-dim)] mb-1">Revision</div>
                <div
                  class="font-mono text-xs break-all text-[var(--text-main)]"
                  x-text="activePresetDetail?.source_revision || '-' "
                ></div>
              </div>
              <div
                class="rounded-xl border border-[var(--border-light)] bg-[var(--bg-body)] p-3"
              >
                <div class="text-xs text-[var(--text-dim)] mb-1">保存能力</div>
                <div class="text-xs text-[var(--text-main)]">
                  保存
                  <span
                    x-text="activePresetDetail?.capabilities?.can_save ? '是' : '否'"
                  ></span>
                  / 另存为
                  <span
                    x-text="activePresetDetail?.capabilities?.can_save_as ? '是' : '否'"
                  ></span>
                  / 重命名
                  <span
                    x-text="activePresetDetail?.capabilities?.can_rename ? '是' : '否'"
                  ></span>
                </div>
              </div>
            </div>
          </section>
        </div>
      </template>
    </div>
  </div>
</div>
